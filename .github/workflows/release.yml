name: Release & Publish PyPI

permissions:
  contents: write
  id-token: write  # 添加这一行，Trusted Publisher 必需

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # Checkout
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ======================
      # Read version from pyproject.toml
      # ======================
      - name: Read version
        id: version
        run: |
          python - << 'EOF' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          if not path.exists():
              raise SystemExit("❌ pyproject.toml not found")

          text = path.read_text(encoding="utf-8")
          m = re.search(r'version = "(.*?)"', text)
          if not m:
              raise SystemExit("❌ version not found")

          print(f"version={m.group(1)}")
          EOF

      # ======================
      # Ensure tag does not exist
      # ======================
      - name: Check tag not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "❌ Tag ${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      # ======================
      # Create & push tag
      # ======================
      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      # ======================
      # Get merged PR body (preserve Markdown)
      # ======================
      - name: Get PR description
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "main",
              per_page: 5
            });

            const pr = prs.find(p => p.merge_commit_sha === context.sha);
            const body = pr && pr.body ? pr.body : "";

            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              `body<<EOF\n${body}\nEOF\n`
            );

      # ======================
      # Set up Python
      # ======================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ======================
      # Install build dependencies
      # ======================
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync
          uv add "packaging>=23.1" build

      # ======================
      # Build release archives
      # ======================
      - name: Build zip and tar.gz
        run: |
          mkdir -p release
          rsync -av \
            --exclude .git \
            --exclude .github \
            --exclude doc \
            --exclude .gitignore \
            --exclude README.md \
            --exclude README_EN.md \
            --exclude main.py \
            --exclude setup.py \
            --exclude uv.lock \
            CETNext release/CETNext

          cd release
          zip -r ../cet-${{ steps.version.outputs.version }}.zip CETNext
          tar czf ../cet-${{ steps.version.outputs.version }}.tar.gz CETNext

      # ======================
      # Build Python package
      # ======================
      - name: Build Python package
        run: |
          rm -rf build dist *.egg-info
          uv run python -m build

      # ======================
      # Create GitHub Release
      # ======================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Version ${{ steps.version.outputs.version }}
          body: |
            <img src="https://s3.bmp.ovh/imgs/2024/10/25/7cd326afa68c3c6a.png" width="81" alt="言叶大魔王">

            ## 🔧 发行版说明：

            此发行版由 GitHub Action 自动生成。如果你要将 CETNext 作为库导入到项目中，请下载此发行版。

            ## 🐱 不同之处：

            此发行版仅包含 **CETNext** 库文件夹，并额外提供可直接安装的 wheel 包。

            ## 🔧 使用方法：

            - 直接拷贝 **CETNext** 文件夹到你的项目
            - 或下载 wheel 包进行本地安装

            导入：`import CETNext`  
            安装：`pip install <wheel包路径>` 或 `pip install CETNext`

            ## 💻 更新日志

            ${{ steps.pr.outputs.body }}
          files: |
            cet-${{ steps.version.outputs.version }}.zip
            cet-${{ steps.version.outputs.version }}.tar.gz
            dist/*.whl

      # ======================
      # Publish to PyPI (Trusted Publisher)
      # ======================
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true